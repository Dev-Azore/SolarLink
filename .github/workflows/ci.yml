name: SolarLink CI Pipeline

on:
  pull_request:
    branches: [ develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    # Map GitHub Secrets to Job-level Environment Variables
    env:
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      DB_NAME: postgres
      DB_USER: postgres
      DB_HOST: localhost
      DB_PORT: 5432

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8

      - name: 🔍 Linting
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 🧪 Run Tests
        run: |
          cd backend
          python manage.py test --no-input